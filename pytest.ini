[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -x
    --tb=short
    --strict-markers
    -q
markers =
    unit: Unit tests — no Neo4j required
    integration: Integration tests — requires Neo4j testcontainer
    security: Security/injection/compliance tests
    compliance: Compliance validation tests
    finding: Finding classification tests
    invariant: Invariant enforcement tests
    contract: Contract enforcement tests
    performance: Performance benchmark tests
filterwarnings =
    ignore::DeprecationWarning
