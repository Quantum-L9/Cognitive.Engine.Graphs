[pytest]
asyncio_mode = auto
# pytest-asyncio >=1.0: run all async tests and async fixtures on one shared
# session-scoped event loop so the session-scoped graph_driver fixture (Neo4j
# connection) and the function-scoped tests that use it share the same loop.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -q
    -ra
markers =
    unit: Unit tests — no Neo4j required
    integration: Integration tests — requires Neo4j testcontainer
    security: Security/injection/compliance tests
    compliance: Regulatory compliance tests
    performance: Performance benchmarks
    slow: Slow tests (>5s)
    contract: Contract verification tests (W5-01)
    finding: Audit finding regression test (W5-02)
filterwarnings =
    ignore::DeprecationWarning
