# DORA META: Terminology Consistency Guard
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CREATED: 2026-02-15T21:34:00-04:00
# AUTHOR: L9 Engineering (cryptoxdog)
# PURPOSE: Enforce consistent terminology across codebase (transportPacket, not PacketEnvelope)
# DEPENDENCIES: grep, Python check script
# DEPLOYMENT: Runs on all PRs
# DORA METRICS: Zero terminology drift | Review time saved >2hr/week
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Terminology Guard

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: terminology-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-terminology:
    name: Check Terminology Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # The PacketEnvelope prohibition check moved to the baseline ratchet
      # (.github/workflows/baseline-ratchet-caller.yml → l9-ci-core
      # "Baseline Ratchet / Quarantined Debt"). The ratchet performs a
      # FULL-repository AST scan on every PR — strictly stronger than the
      # changed-file grep this workflow used to run — and compares every
      # finding fingerprint against the reviewed ledger at
      # .l9/baselines/packet-envelope.yml, failing closed on any new,
      # increased, moved, expired, or unowned reference. The legacy
      # tools/check_packet_envelope_prohibited.py was deleted.

      - name: Check Forbidden Terms
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            mapfile -t changed_python < <(
              git diff --name-only --diff-filter=ACMR \
                "${{ github.event.pull_request.base.sha }}" \
                "${{ github.event.pull_request.head.sha }}" \
                -- '*.py' | grep -E '^(engine|tests)/' || true
            )
          else
            mapfile -t changed_python < <(find engine tests -name '*.py' -type f)
          fi

          if [ "${#changed_python[@]}" -eq 0 ]; then
            echo "No in-scope Python files; terminology check is not applicable"
            exit 0
          fi

          FORBIDDEN_TERMS=(
            "\bSubstrate\b(?!Service)"
            "\blog\.(?!bind)"
            "\bprint\("
            "\bOptional\["
            "\bList\["
            "\bDict\["
            "\bTuple\["
            "\bSet\["
          )

          violations=0
          for term in "${FORBIDDEN_TERMS[@]}"; do
            echo "Checking changed files for: $term"
            if grep -nH -P "$term" "${changed_python[@]}"; then
              echo "❌ Found forbidden term: $term"
              violations=$((violations + 1))
            fi
          done

          if [ "$violations" -gt 0 ]; then
            echo "❌ Terminology violation classes found: $violations"
            echo "Use transportPacket, SubstrateService, structlog, T | None, and built-in generics"
            exit 1
          fi

          echo "✅ No terminology violations introduced by this PR"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
