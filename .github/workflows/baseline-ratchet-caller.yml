# ═══════════════════════════════════════════════════════════════════════════
# Baseline Ratchet — thin caller (MVTR pilot)
#
# All ratchet logic lives in the reusable workflow pinned below by immutable
# commit SHA (Quantum-L9/l9-ci-core). This caller only supplies repository-
# specific inputs. CI never writes ledgers — only humans do, in reviewed PRs
# (see .github/CODEOWNERS: .l9/baselines/** requires owner review).
#
# Branch-protection check names exposed by the reusable workflow:
#   Baseline Ratchet / Required Tests
#   Baseline Ratchet / Quarantined Debt
#   Baseline Ratchet / Workflow Integrity
#   Baseline Ratchet / Ratchet Verdict
# ═══════════════════════════════════════════════════════════════════════════
name: Baseline Ratchet

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ratchet:
    name: Baseline Ratchet
    uses: Quantum-L9/l9-ci-core/.github/workflows/baseline-ratchet.yml@f5d65700d8ed8b0b4257d63a4c1e8c1a761e2a46
    with:
      core-revision: f5d65700d8ed8b0b4257d63a4c1e8c1a761e2a46
      sdk-revision: b390dc78e3464cca539b998dfb723481927ed91b
      python-version: "3.12"
      pytest-paths: tests
      test-quarantine-ledger: .l9/baselines/test-quarantine.yml
      packet-envelope-ledger: .l9/baselines/packet-envelope.yml
      packet-envelope-declaration-paths: engine/packet/packet_envelope.py l9_core/models.py
      requirements-files: requirements.txt requirements-dev.txt requirements-ci.txt
