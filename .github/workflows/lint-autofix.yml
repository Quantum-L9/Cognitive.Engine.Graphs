# --- L9_META ---
# l9_schema: 1
# origin: engine-specific
# engine: graph
# layer: [ci]
# tags: [ci, lint, autofix, ruff]
# owner: platform
# status: active
# --- /L9_META ---
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Lint Autofix (Ruff) — replaces the former "ADR Auto-Fixer" workflow
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PURPOSE: Run `ruff check --fix` + `ruff format` on `main` and open a
#          PR with the results (never push directly to a protected branch).
# WHY: The previous auto-fix-adr.yml depended on ci/auto_fix_adr.py and
#      ci/check_imports.py, neither of which exists in this repo — that
#      workflow could never succeed. ruff already mechanically enforces
#      (and can autofix) the same class of issues the old ADR script
#      targeted: sorted `__all__` (RUF022), `Optional[T]` -> `T | None`
#      (UP045), `datetime.now()` -> `datetime.now(UTC)` (UP017/DTZ003),
#      `zip(strict=True)` (B905), unused/unsorted imports (F401/I001),
#      etc. — see [tool.ruff.lint] in pyproject.toml for the full rule set.
# DEPLOYMENT: Runs on push to main, or on demand via workflow_dispatch.
#      (This repo has no `develop` branch — an earlier revision targeted
#      it and could never fire.)
# PERMISSIONS: peter-evans/create-pull-request needs `contents: write`
#      (push the autofix branch) and `pull-requests: write` (open the PR);
#      `contents: read` is not sufficient per the action's official docs.
# TOKEN NOTE: PRs created with the default GITHUB_TOKEN do not trigger
#      `push`/`pull_request` workflows (GitHub anti-recursion). If autofix
#      PRs must receive the normal CI suite, provide a GitHub App token or
#      PAT via a repo secret and pass it to `token:` below.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Lint Autofix (Ruff)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lint-autofix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  lint-autofix:
    name: Autofix Ruff Lint/Format Violations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run Ruff Autofix
        id: autofix
        run: |
          ruff check . --fix
          ruff format .

      - name: Validate Syntax After Fixes
        run: |
          python -m py_compile $(find . -name "*.py" \
            -not -path "./venv/*" -not -path "./.venv/*" \
            -not -path "./__pycache__/*" -not -path "./build/*" -not -path "./dist/*")

      - name: Confirm No Remaining Autofixable Violations
        run: ruff check .

      - name: Check For Changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: automated ruff lint/format autofix"
          title: "Lint Autofix: automated ruff corrections"
          body: |
            ## Automated Lint Autofix

            This PR contains automated fixes produced by:

            ```bash
            ruff check . --fix
            ruff format .
            ```

            on `main`, using the ruff version pinned in
            `requirements-ci.txt` / `pyproject.toml`.

            **Validation status:**
            - Syntax validation passed (`python -m py_compile`)
            - No remaining autofixable `ruff check` violations

            **Review required:** confirm the diff is purely mechanical
            before merging. Non-autofixable violations (e.g. `PLR0915`,
            `mypy` errors) are not touched by this workflow and must be
            fixed manually — see `make lint` / `make lint-fix`.

            ---
            *Generated by the Lint Autofix workflow, run ${{ github.run_id }}.*
          branch: lint-autofix/ruff-${{ github.run_number }}
          base: main
          labels: |
            automated
            lint
            ci
          draft: false

      - name: No Changes Needed
        if: steps.diff.outputs.changed == 'false'
        run: echo "ruff found nothing to autofix on main — no PR needed."
