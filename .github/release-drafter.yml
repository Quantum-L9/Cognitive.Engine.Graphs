# --- L9_META ---
# l9_schema: 2
# origin: l9-template
# engine: graph
# layer: [ci]
# tags: [governance]
# status: active
# --- /L9_META ---
#
# Release Drafter configuration — consumed by .github/workflows/release-drafter.yml
name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
      - 'bugfix'
  - title: 'Maintenance'
    labels:
      - 'chore'
      - 'ci'
      - 'dependencies'
      - 'documentation'

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bug'
      - 'chore'
      - 'ci'
  default: patch

autolabeler:
  - label: 'fix'
    title:
      - '/^fix/i'
  - label: 'feature'
    title:
      - '/^feat/i'
  - label: 'chore'
    title:
      - '/^(chore|style|refactor|docs|test|ci)/i'

template: |
  ## Changes

  $CHANGES
