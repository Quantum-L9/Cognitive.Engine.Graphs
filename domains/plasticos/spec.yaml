domain:
  id: plasticos
  name: PlasticOS
  version: 1.0.0
ontology:
  nodes:
    - label: Buyer
      canonical: company
      managedby: sync
      candidate: true
      matchdirection: intake_to_buyer
      properties:
        - name: entity_id
          type: string
          required: true
        - name: revenue
          type: float
        - name: margin
          type: float
        - name: risk
          type: float
        - name: capacity
          type: float
    - label: Supplier
      canonical: company
      managedby: sync
      candidate: false
      matchdirection: intake_to_buyer
      properties:
        - name: entity_id
          type: string
          required: true
        - name: revenue
          type: float
        - name: margin
          type: float
        - name: risk
          type: float
        - name: capacity
          type: float
    - label: Contact
      canonical: person
      managedby: sync
      candidate: false
      matchdirection: intake_to_buyer
      properties:
        - name: entity_id
          type: string
          required: true
        - name: email
          type: string
  edges:
    - type: KNOWS
      from: Contact
      to: Buyer
      direction: DIRECTED
      category: capability
      managedby: sync
matchentities:
  candidate:
    - label: Buyer
      matchdirection: intake_to_buyer
  queryentity:
    - label: Supplier
      matchdirection: intake_to_buyer
queryschema:
  matchdirections:
    - intake_to_buyer
  fields: []
traversal:
  steps:
    - name: buyer_traversal
      pattern: "(b:Buyer)-[:KNOWS]-(c:Contact)"
      required: true
      matchdirections:
        - intake_to_buyer
gates: []
scoring:
  dimensions:
    - name: revenue
      source: candidateproperty
      candidateprop: revenue
      computation: lognormalized
      weightkey: w_revenue
      defaultweight: 0.40
    - name: margin
      source: candidateproperty
      candidateprop: margin
      computation: lognormalized
      weightkey: w_margin
      defaultweight: 0.30
    - name: risk
      source: candidateproperty
      candidateprop: risk
      computation: inverselinear
      weightkey: w_risk
      defaultweight: 0.20
    - name: capacity
      source: candidateproperty
      candidateprop: capacity
      computation: lognormalized
      weightkey: w_capacity
      defaultweight: 0.10
sync:
  endpoints:
    - path: /sync/buyers
      method: POST
      targetnode: Buyer
      idproperty: entity_id
      batchstrategy: UNWINDMERGE
    - path: /sync/suppliers
      method: POST
      targetnode: Supplier
      idproperty: entity_id
      batchstrategy: UNWINDMERGE
compliance:
  required_fields:
    - entity_id
    - revenue
    - margin
    - risk
    - capacity
decision_policy:
  version: 1.0.0
  hard_constraints:
    - metric: compliance_pass
      operator: eq
      value: true
    - metric: risk
      operator: lte
      value: 0.70
  weights:
    revenue: 0.40
    margin: 0.30
    risk: 0.20
    capacity: 0.10
  thresholds:
    approve_threshold: 0.50
    reject_threshold: 0.20
    conflict_tolerance: 0.35
