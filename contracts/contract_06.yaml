id: CONTRACT-06
name: PacketEnvelope Only
layer: packet
level: MUST
scope:
  paths:
  - engine/packet/**/*.py
  - engine/handlers.py
preconditions:
- Inter-service payload created
postconditions:
- Wrapped via inflate_ingress() at entry
- Wrapped via deflate_egress() at exit
docs:
- docs/contracts/PACKET_ENVELOPE_FIELDS.md
- docs/contracts/PACKET_TYPE_REGISTRY.md
- docs/contracts/MEMORY_SUBSTRATE_ACCESS.md
- docs/contracts/FEEDBACK_LOOPS.md
verification:
  scanner_rules:
  - PKT-001
  - MEM-001
  - MEM-002
  test: tests/contracts/test_contracts.py::TestContract06TransportPacket
