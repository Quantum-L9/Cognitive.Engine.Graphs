id: CONTRACT-07
name: Immutability + Content Hash
layer: packet
level: MUST
scope:
  paths:
  - engine/packet/**/*.py
preconditions:
- PacketEnvelope mutation attempted
postconditions:
- Mutations via .derive() only
- content_hash SHA-256 UNIQUE constraint
docs:
- docs/contracts/PACKET_ENVELOPE_FIELDS.md
- docs/contracts/SHARED_MODELS.md
verification:
  scanner_rules:
  - SHARED-001
  test: tests/contracts/test_contracts.py::TestContract07ImmutabilityPayloadHash
