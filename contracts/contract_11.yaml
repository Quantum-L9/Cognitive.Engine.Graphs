id: CONTRACT-11
name: PII Handling
layer: security
level: MUST
scope:
  paths:
  - engine/compliance/**/*.py
preconditions:
- PII field accessed
postconditions:
- 'Handling per spec: hash|encrypt|redact|tokenize'
- Engine never logs PII values
docs:
- docs/contracts/PII_HANDLING.md
verification:
  scanner_rules: []
  test: tests/contracts/test_contracts.py::TestContract11PIIHandling
