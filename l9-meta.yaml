# --- L9_META ---
# l9_schema: 2
# origin: l9-template
# engine: graph
# layer: [meta]
# tags: [governance, portability]
# status: active
# --- /L9_META ---
# L9_META source of truth for this repository.
#
# Resolution, most specific last:
#   defaults  ->  rules (last match wins)  ->  overrides[exact path]
#
# Generated by `python -m tools.l9_meta.cli sync --adopt` from headers already
# present on disk. Edit freely; re-running sync will not clobber hand edits
# unless you pass --adopt again.

engine: graph

defaults:
  origin: engine-specific
  layer: [engine]
  status: active

exclude:
  - artifacts/

vocabulary:
  origin: [engine-specific, l9-template, chassis, domain-specific]
  status: [active, deprecated, dormant, experimental]
  layer:
    [
      agent-rules, api, arbitration, audit, auth, boot, causal, ci, compliance,
      config, contracts, dev, diagnostics, docker, docs, engine, feedback,
      governance, graph, health, hoprag, infra, intake, kge, meta, packet,
      personas, reports, resolution, scoring, scripts, security, services,
      telemetry, test, tools, traversal,
    ]

  # Tags are three facets, not free text. The corpus this replaces had 343
  # distinct tags across 371 files — 197 used exactly once, and 41 that merely
  # restated `layer`. Neither is queryable, so the taxonomy is closed:
  #
  #   family     (exactly 1) which product surface the file serves. Orthogonal
  #                          to `layer`: layer says what kind of file it is,
  #                          family says what it is for.
  #   capability (0-2)       the specific mechanism it implements or exercises.
  #   concern    (0-2)       a cross-cutting property worth querying across
  #                          families.
  #
  # A tag may appear in only one facet — otherwise cardinality is ambiguous.
  tags:
    max_tags: 4
    max_per_facet:
      capability: 2
      concern: 2
    min_files: 2

    family:
      - matching # gate -> score -> rank: the request path
      - intelligence # derived and learned signal that feeds matching
      - ingestion # data in: intake, sync, enrichment, readiness
      - platform # chassis, packets, driver, config, boot, telemetry
      - governance # contracts, compliance, audit, agent instructions
      - delivery # CI, containers, scripts, tooling, templates

    capability:
      - arbitration
      - boot
      - calibration
      - causal
      - chassis
      - confidence
      - domain-spec
      - driver
      - embeddings
      - enrichment
      - feedback
      - fixtures
      - gates
      - gds
      - gmp
      - handlers
      - harness
      - hoprag
      - intake
      - packet
      - personas
      - readiness
      - resolution
      - scoring
      - settings
      - sync
      - traversal

    concern:
      - compliance
      - deprecated
      - determinism
      - dormant
      - observability
      - performance
      - pii
      - portability
      - security

# Directory rules. A trailing `/` means everything beneath.
rules:
  # Directory rules in lexicographic path order. That ordering is load-bearing:
  # resolution is last-match-wins, so `docs/` listed after `docs/contracts/`
  # would silently clobber the child. Sorting by path guarantees parent first.
  #
  # `values.update()` replaces `tags` wholesale rather than merging, so a child
  # rule restates the full set. The alternative is a tag that accumulates down a
  # deep path with no way to drop it.
  - path: ".claude/"
    layer: [agent-rules]
    tags: [governance]
  - path: ".claude/skills/"
    layer: [agent-rules]
    tags: [governance, gmp]
  - path: ".devcontainer/"
    layer: [dev]
    tags: [delivery]
  - path: ".github/"
    origin: l9-template
    layer: [governance]
    tags: [governance]
  - path: ".github/workflows/"
